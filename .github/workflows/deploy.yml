name: Deploy to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  win:
    runs-on: windows-latest
    steps:
      - name: Setup Go environment
        uses: actions/setup-go@v4.1.0
        with:
          go-version: ">=1.21.1"
          cache: false
          architecture: x64
      - name: Checkout
        uses: actions/checkout@v3
      - name: Tidy
        run: go mod tidy
      - name: Test
        run: go run test/main.go
      - name: Build
        run: 'go build -ldflags="-s -w" -o selene-windows-amd64.exe cmd/selene/selene.go'
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: "./selene-windows-amd64.exe"
  win_arm:
    runs-on: windows-latest
    steps:
      - name: Setup Go environment
        uses: actions/setup-go@v4.1.0
        with:
          go-version: ">=1.21.1"
          cache: false
          architecture: x64
      - name: Checkout
        uses: actions/checkout@v3
      - name: Tidy
        run: go mod tidy
      - name: Test
        run: go run test/main.go
      - name: Build
        run: 'env GOARCH=arm64 go build -ldflags="-s -w" -o selene-windows-arm64.exe cmd/selene/selene.go'
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: "./selene-windows-arm64.exe"
  mac:
    runs-on: macos-latest
    steps:
      - name: Setup Go environment
        uses: actions/setup-go@v4.1.0
        with:
          go-version: ">=1.21.1"
          cache: false
          architecture: x64
      - name: Checkout
        uses: actions/checkout@v3
      - name: Tidy
        run: go mod tidy
      - name: Test
        run: go run test/main.go
      - name: Build
        run: 'go build -ldflags="-s -w" -o selene-darwin-amd64 cmd/selene/selene.go'
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: "./selene-darwin-amd64"
      - name: Build ARM
        run: 'env GOARCH=arm64 go build -ldflags="-s -w" -o selene-darwin-arm64 cmd/selene/selene.go'
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: "./selene-darwin-arm64"
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go environment
        uses: actions/setup-go@v4.1.0
        with:
          go-version: ">=1.21.1"
          cache: false
          architecture: x64
      - name: Checkout
        uses: actions/checkout@v3
      - name: Tidy
        run: go mod tidy
      - name: Test
        run: go run test/main.go
      - name: Build
        run: 'go build -ldflags="-s -w" -o selene-linux-amd64 cmd/selene/selene.go'
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: "./selene-linux-amd64"
      - name: Build ARM
        run: 'env GOARCH=arm64 go build -ldflags="-s -w" -o selene-linux-arm64 cmd/selene/selene.go'
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: "./selene-linux-arm64"
  deploy:
    needs:
      - win
      - win_arm
      - mac
      - ubuntu
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Download artifact
        uses: actions/download-artifact@v3
      - name: LS
        run: ls -l
      - name: Generate index.html
        run: |
          cd artifact
          echo '<!DOCTYPE html>' >> index.html
          echo '<html lang="en-US"><head>' >> index.html
          echo '<title>Selene Artifacts</title>' >> index.html
          echo '<style>:root{color-scheme: light dark; font-family: sans-serif;}</style>' >> index.html
          echo '</head><body>' >> index.html
          echo '<h1>Artifacts</h1>' >> index.html
          echo '<ul>' >> index.html
          echo '<li><a download="selene" href="selene-darwin-amd64">selene-darwin-amd64</a></li>' >> index.html
          echo '<li><a download="selene" href="selene-darwin-arm64">selene-darwin-arm64</a></li>' >> index.html
          echo '<li><a download="selene" href="selene-linux-amd64">selene-linux-amd64</a></li>' >> index.html
          echo '<li><a download="selene" href="selene-linux-arm64">selene-linux-arm64</a></li>' >> index.html
          echo '<li><a download="selene.exe" href="selene-windows-amd64.exe">selene-windows-amd64.exe</a></li>' >> index.html
          echo '<li><a download="selene.exe" href="selene-windows-arm64.exe">selene-windows-arm64.exe</a></li>' >> index.html
          echo '</ul>' >> index.html
          echo '</body></html>' >> index.html
          cd ..
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: "./artifact"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
