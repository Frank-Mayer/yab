name: Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go environment
        uses: actions/setup-go@v4.1.0
        with:
          go-version: ">=1.21.1"
          cache: false
          architecture: x64
      - name: Checkout
        uses: actions/checkout@v3
      - name: Tidy
        run: go mod tidy
      - name: Test
        run: go run cmd/test/main.go
